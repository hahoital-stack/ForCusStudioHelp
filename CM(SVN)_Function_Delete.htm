<p style="margin: 0px 0px 0px 60px; font-weight: bold;"><a name="Func_WB_Delete">Delete</a></p>
	<p style="margin: 0px 0px 0px 60px; font-weight: bold;">&nbsp;</p>
	<p style="margin: 0px 0px 0px 90px; font-weight: normal;">- 형상관리 중인 파일을 대상으로 SVN Delete를 처리 합니다.</p>
	<p style="margin: 0px 0px 0px 100px; font-weight: normal;">+ 형상관리 에서 상태가 <span style="font-weight: normal; color: #FF873C;">Deleted</span> 로 바뀌고 Commit 을 하면 파일 상태가 <span style="font-weight: normal; color: #7391BE;">NotVersioned</span> 상태로 바뀜니다.</p>
	<p style="margin: 0px 0px 0px 100px; font-weight: normal;">&nbsp;</p>
	<p style="margin: 0px 0px 0px 100px; font-weight: normal;"><img src="images/CM(SVN)_WC_Delete.png" width="516" height="383"></p>
	<p style="margin: 0px 0px 0px 100px; font-weight: normal;">&nbsp;</p>
	<p style="margin: 0px 0px 0px 100px; font-weight: normal;">* 실제 파일이 삭제 되지는 않고 형상관리 에서만 빠짐니다</p>
	<p style="margin: 0px 0px 0px 60px; font-weight: bold;">&nbsp;</p>
